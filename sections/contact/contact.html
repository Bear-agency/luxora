    <section class="section contact reveal" id="contact" data-reveal>
      <div class="container contact-grid">
        <div class="contact-intro">
          <h2>Ready to Build Your Financial Foundation?</h2>
          <p>Whether you're managing operations globally or structuring cross-border payments — we are here to build that foundation with you.</p>
        </div>
        <form class="form" id="consult-form" novalidate>
          <div class="form-row">
            <div>
              <label for="biz">Business Name</label>
              <input id="biz" name="business" type="text" autocomplete="organization" required />
            </div>
            <div>
              <label for="email">Email</label>
              <input id="email" name="email" type="email" autocomplete="email" required />
            </div>
          </div>
          <div class="form-row">
            <div>
              <label for="phone">Phone</label>
              <input id="phone" name="phone" type="tel" autocomplete="tel" />
            </div>
            <div>
              <label for="type">Type of Business</label>
              <select id="type" name="type" required>
                <option value="">Select…</option>
                <option>Technology / SaaS</option>
                <option>E-Commerce</option>
                <option>Trading / Import-Export</option>
                <option>Professional Services</option>
                <option>Private Client</option>
                <option>Other</option>
              </select>
            </div>
          </div>
          <button type="submit" class="btn-gold">Request a Consultation</button>
        </form>
      </div>
    </section>
